<!DOCTYPE html>
<html lang="tr">
<head>
  <base href="/hukuk-reels/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- ── PWA Temel ── -->
  <meta name="theme-color" content="#E91E63">
  <meta name="description" content="Çevrimdışı hukuk eğitim uygulaması">
  <link rel="manifest" href="manifest.json">

  <!-- ── iOS Safari PWA (Add to Home Screen) ── -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hukuk Reels">

  <!-- iOS Safari ikon boyutları -->
  <link rel="apple-touch-icon" href="icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167x167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">

  <!-- iOS Splash Screen'ler (en yaygın cihazlar) -->
  <!-- iPhone 15 Pro Max / 14 Pro Max (430x932) -->
  <link rel="apple-touch-startup-image"
        href="icons/splash-1290x2796.png"
        media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
  <!-- iPhone 15 / 14 (390x844) -->
  <link rel="apple-touch-startup-image"
        href="icons/splash-1170x2532.png"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
  <!-- iPhone SE 3 (375x667) -->
  <link rel="apple-touch-startup-image"
        href="icons/splash-750x1334.png"
        media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <!-- iPad Air / 10.9" (820x1180) -->
  <link rel="apple-touch-startup-image"
        href="icons/splash-1640x2360.png"
        media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2)">

  <!-- ── Android Chrome PWA ── -->
  <meta name="application-name" content="Hukuk Reels">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1A0A14">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.png">

  <title>Hukuk Reels</title>

  <style>
    /* Yükleme ekranı */
    body {
      margin: 0;
      padding: 0;
      background-color: #1A0A14;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      /* iOS safe area desteği */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #FF80AB;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading p {
      color: rgba(255,255,255,0.5);
      margin-top: 16px;
      font-size: 14px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* iOS rubber-band scroll engeli */
    html, body {
      position: fixed;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Hukuk Reels yükleniyor...</p>
  </div>

  <script>
    // ── Android Chrome PWA Install Prompt ──
    let _deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _deferredInstallPrompt = e;
      console.log('[PWA] Install prompt yakalandı');
    });

    // Flutter'dan çağrılabilir: Chrome'un native install dialog'unu göster
    async function triggerInstallPrompt() {
      if (!_deferredInstallPrompt) return false;
      _deferredInstallPrompt.prompt();
      const result = await _deferredInstallPrompt.userChoice;
      _deferredInstallPrompt = null;
      return result.outcome === 'accepted';
    }

    // PWA modunda mı çalışıyor kontrolü
    function isRunningStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
    }

    window.addEventListener('appinstalled', function() {
      console.log('[PWA] Uygulama yüklendi!');
      _deferredInstallPrompt = null;
    });

    // ── Web Kamera Yardımcı Fonksiyonları ──
    // Flutter'dan JS interop ile çağrılır

    let _cameraStream = null;
    let _videoElement = null;

    // Kamerayı başlat (arka kamera tercihli)
    async function startCamera(viewId) {
      try {
        const constraints = {
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        };
        _cameraStream = await navigator.mediaDevices.getUserMedia(constraints);

        _videoElement = document.getElementById(viewId);
        if (_videoElement) {
          _videoElement.srcObject = _cameraStream;
          _videoElement.setAttribute('playsinline', 'true');
          _videoElement.play();
        }
        return true;
      } catch (e) {
        console.error('[Camera] Hata:', e);
        return false;
      }
    }

    // Kameradan fotoğraf çek (base64 döner)
    function capturePhoto() {
      if (!_videoElement) return null;
      const canvas = document.createElement('canvas');
      canvas.width = _videoElement.videoWidth || 1280;
      canvas.height = _videoElement.videoHeight || 720;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(_videoElement, 0, 0);
      return canvas.toDataURL('image/png');
    }

    // Kamerayı kapat
    function stopCamera() {
      if (_cameraStream) {
        _cameraStream.getTracks().forEach(t => t.stop());
        _cameraStream = null;
      }
      if (_videoElement) {
        _videoElement.srcObject = null;
        _videoElement = null;
      }
    }

    // Service Worker kaydı + OTOMATİK GÜNCELLEME
    // Yeni sürüm yayınlandığında (push) kullanıcı uygulamayı bir sonraki
    // açışında otomatik olarak günceli alır; silip yeniden yüklemesi gerekmez.
    if ('serviceWorker' in navigator) {
      var _swRefreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (_swRefreshing) return;
        _swRefreshing = true;
        window.location.reload();
      });
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('flutter_service_worker.js?v=1982557814') /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */.then(function (reg) {
          console.log('[SW] kayıt başarılı:', reg.scope);
          // Yeni sürüm bulununca kurulur kurulmaz etkinleştir
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', function () {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage('skipWaiting');
              }
            });
          });
          // Uygulama açıkken de saatte bir güncellemeyi kontrol et
          setInterval(function () { reg.update(); }, 60 * 60 * 1000);
        });
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
