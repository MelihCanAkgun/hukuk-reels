name: hukuk_reels
description: Offline hukuk eğitim uygulaması - Reels tarzı dikey kaydırmalı flashcard ve test sistemi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Yerel Veritabanı (Web uyumlu)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Ses Oynatıcı (Web + Mobil)
  just_audio: ^0.9.39

  # State Management
  flutter_riverpod: ^2.5.1

  # UI Yardımcıları
  fl_chart: ^0.68.0
  shimmer: ^3.0.0

  # Web JS Interop (kamera + OCR)
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
