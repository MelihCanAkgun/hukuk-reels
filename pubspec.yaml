name: hukuk_reels
description: Medeni Usul Hukuku Final - Reels tarzı dikey kaydırmalı soru çözme uygulaması
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Arka plan müziği (Web + Mobil)
  just_audio: ^0.9.39

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    # Kendi köşe görsellerini buraya (assets/images/) ekleyebilirsin.
    - assets/images/
    # Kendi müziklerini buraya (assets/audio/) ekleyip
    # lib/core/config/app_config.dart içindeki listeye yazman yeterli.
    - assets/audio/

  # Türkçe karakterleri (ç ğ ı İ ö ş ü) tam destekleyen Inter fontu.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
